<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X用 YouTube時間指定リンク作成</title>
    <style>
        body {
            background-color: #121212;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        #form-container {
            background: #222;
            padding: 25px;
            border-radius: 8px;
            width: 90%;
            max-width: 400px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            box-sizing: border-box;
            background: #333;
            border: 1px solid #555;
            color: white;
            border-radius: 4px;
        }

        .time-inputs {
            display: flex;
            gap: 10px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #1da1f2;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
            font-size: 16px;
            margin-top: 10px;
        }

            button:hover {
                background: #0c85d0;
            }

        .result {
            margin-top: 20px;
            word-break: break-all;
            background: #000;
            padding: 15px;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid #444;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="form-container">
        <h3 style="margin-top:0; text-align:center;">X用リンク作成</h3>
        <label>YouTubeのURL</label>
        <input type="text" id="yt-url" placeholder="https://www.youtube.com/watch?v=...">

        <div class="time-inputs">
            <div style="flex: 1;">
                <label>分</label>
                <input type="number" id="start-min" value="0" min="0">
            </div>
            <div style="flex: 1;">
                <label>秒</label>
                <input type="number" id="start-sec" value="0" min="0" max="59">
            </div>
        </div>

        <button onclick="generateURL()">リンクを作成</button>
        <div id="result-area" class="result" onclick="copyURL()"></div>
    </div>

    <script>
        function generateURL() {
        const urlInput = document.getElementById('yt-url').value;
        const m = parseInt(document.getElementById('start-min').value) || 0;
        const s = parseInt(document.getElementById('start-sec').value) || 0;

        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = urlInput.match(regExp);
        const videoId = (match && match[2].length === 11) ? match[2] : null;

        if (!videoId) {
        alert('正しいYouTubeのURLを入力してください。');
        return;
        }

        const totalSeconds = (m * 60) + s;
        let finalUrl = `https://youtu.be/${videoId}`;
        if (totalSeconds > 0) {
        finalUrl += `?t=${totalSeconds}s`;
        }

        const resultArea = document.getElementById('result-area');
        resultArea.style.display = 'block';
        resultArea.textContent = finalUrl;
        }

        function copyURL() {
        const text = document.getElementById('result-area').textContent;
        navigator.clipboard.writeText(text).then(() => {
        alert('コピーしました！これをXに貼り付けてください。');
        });
        }
    </script>
</body>
</html>
